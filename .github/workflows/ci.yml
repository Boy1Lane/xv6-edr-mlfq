name: CI Build & Test Verification

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build Kernel & Run Automated Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Install Toolchain & QEMU RISC-V
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            gcc-riscv64-unknown-elf \
            binutils-riscv64-unknown-elf \
            qemu-system-misc \
            python3

      - name: Verify Kernel Compilation
        run: |
          make clean
          make kernel/kernel

      - name: Execute EDR Security Tests
        run: |
          make test-edr

      - name: Execute MLFQ Scheduler Tests
        run: |
          make test-mlfq

      - name: Execute False Positive Tests
        run: |
          make test-false-positive

      - name: Execute Full System Usertests
        run: |
          make test-usertests
